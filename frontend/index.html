<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>NutriAI</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="background"></div>

  <header>

    <nav>

      <h1>NutriAI</h1>

      <button class="nav-btn">
        Inteligência Nutricional
      </button>

    </nav>

    <section class="hero">

      <div class="hero-text">

        <h2>
          Tecnologia e IA ajudando na sua alimentação 🍎
        </h2>

        <p>
          Tire dúvidas sobre nutrição, alergias alimentares
          e qualidade de vida utilizando inteligência artificial.
        </p>

      </div>

    </section>

  </header>

  <main>

    <section class="chat-container">

      <div class="chat-box" id="chat-box">

        <div class="message bot">
          Olá! Eu sou a NutriAI 🤖<br><br>

          Posso ajudar com:
          <br><br>

          • Nutrição
          <br>

          • Calorias
          <br>

          • Alergias
          <br>

          • Alimentação saudável
        </div>

      </div>

      <div class="input-area">

        <input
          type="text"
          id="user-input"
          placeholder="Pergunte algo sobre alimentação..."
        >

        <button id="send-btn">
          Enviar
        </button>

      </div>

    </section>

  </main>

  <script src="script.js"></script>

</body>
</html>
